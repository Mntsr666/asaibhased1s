<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام إدارة وتخويل الأفراد</title>
    <style>
        body { background: #0b0b0b; color: #e0e0e0; font-family: 'Arial', sans-serif; padding: 20px; text-align: center; }
        .card { background: #1a1a1a; border: 2px solid #d4af37; border-radius: 12px; padding: 20px; box-shadow: 0 0 20px rgba(212,175,55,0.2); max-width: 1000px; margin: auto; }
        .header { background: #d4af37; color: #000; padding: 15px; font-weight: bold; font-size: 22px; border-radius: 8px; margin-bottom: 20px; }
        
        /* أدوات التحكم */
        .controls { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 20px; background: #222; padding: 15px; border-radius: 8px; }
        input { padding: 10px; border-radius: 5px; border: 1px solid #d4af37; background: #000; color: #fff; width: 180px; }
        #searchInput { width: 100%; max-width: 400px; border-width: 2px; font-weight: bold; }
        
        table { width: 100%; border-collapse: collapse; background: #fff; color: #000; margin-top: 10px; border-radius: 8px; overflow: hidden; }
        th, td { border: 1px solid #ccc; padding: 12px; text-align: center; }
        th { background: #d4af37; }
        
        button { padding: 8px 15px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; }
        .btn-add { background: #28a745; color: white; }
        .btn-print { background: #007bff; color: white; }

        /* ستايل التخويل عند الطباعة */
        @media print {
            body * { visibility: hidden; }
            #printArea, #printArea * { visibility: visible; }
            #printArea { position: absolute; left: 0; top: 0; width: 100%; color: black; background: white; padding: 40px; border: 5px double #000; }
        }
    </style>
    <script>
        // قفل الدخول
        var pass = prompt("سيدي، يرجى إدخال رمز الدخول:");
        if (pass !== "2026") { window.location.href = "https://google.com"; }

        // دالة البحث
        function filterTable() {
            var input = document.getElementById("searchInput").value.toUpperCase();
            var rows = document.getElementById("mainTable").getElementsByTagName("tr");
            for (var i = 1; i < rows.length; i++) {
                var nameCell = rows[i].getElementsByTagName("td")[0];
                if (nameCell) {
                    var textValue = nameCell.textContent || nameCell.innerText;
                    rows[i].style.display = textValue.toUpperCase().indexOf(input) > -1 ? "" : "none";
                }
            }
        }

        // دالة الإضافة
        function addPerson() {
            var name = document.getElementById("newName").value;
            var rank = document.getElementById("newRank").value;
            var office = document.getElementById("newOffice").value;
            if(!name || !rank || !office) return alert("سيدي، أكمل البيانات أولاً");
            
            var table = document.getElementById("mainTable").getElementsByTagName('tbody')[0];
            var row = table.insertRow();
            row.innerHTML = `<td>${name}</td><td>${rank}</td><td>${office}</td>
                             <td><button class="btn-print" onclick="printTakhwil('${name}','${rank}','${office}')">إصدار تخويل</button></td>`;
            document.getElementById("newName").value = "";
            document.getElementById("newRank").value = "";
            document.getElementById("newOffice").value = "";
        }

        // دالة طباعة التخويل
        function printTakhwil(name, rank, office) {
            var printWindow = window.open('', '', 'height=600,width=800');
            printWindow.document.write('<html><head><title>تخويل رسمي</title>');
            printWindow.document.write('<style>body{font-family:Arial; text-align:center; padding:50px; border:10px solid #d4af37;} .header{font-size:24px; font-weight:bold; margin-bottom:20px;} .content{font-size:20px; line-height:2;} .footer{margin-top:50px; text-align:left; font-weight:bold;}</style>');
            printWindow.document.write('</head><body dir="rtl">');
            printWindow.document.write('<div class="header">هيئة الحشد الشعبي / عصائب أهل الحق</div>');
            printWindow.document.write('<div class="header">كتاب تخويل رسمي</div>');
            printWindow.document.write('<hr><div class="content">');
            printWindow.document.write('نخول حامل هذه الهوية الأخ المجاهد: <b>' + name + '</b><br>');
            printWindow.document.write('الصنف: <b>' + rank + '</b><br>');
            printWindow.document.write('جهة التنسيب: <b>' + office + '</b><br>');
            printWindow.document.write('للقيام بالمهام الموكلة إليه وتسهيل أمره في كافة السيطرات والقواطع.');
            printWindow.document.write('</div><div class="footer">توقيع آمر المكتب/ ميسان<br><br>_____________</div>');
            printWindow.document.write('</body></html>');
            printWindow.document.close();
            printWindow.print();
        }
    </script>
</head>
<body>

<div class="card">
    <div class="header">نظام إدارة الأفراد وإصدار التخويلات</div>

    <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="🔍 ابحث عن اسم المجاهد هنا...">

    <div class="controls">
        <input type="text" id="newName" placeholder="الاسم الكامل">
        <input type="text" id="newRank" placeholder="الصنف">
        <input type="text" id="newOffice" placeholder="المكتب">
        <button class="btn-add" onclick="addPerson()">+ إضافة للنظام</button>
    </div>

    <table id="mainTable">
        <thead>
            <tr>
                <th>الاسم الكامل</th>
                <th>الصنف</th>
                <th>المكتب</th>
                <th>الإجراء</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>منتظر حميد شاطي</td>
                <td>آمر نظام</td>
                <td>مكتب ميسان</td>
                <td><button class="btn-print" onclick="printTakhwil('منتظر حامد شاطي','آمر نظام','مكتب ميسان')">إصدار تخويل</button></td>
            </tr>
        </tbody>
    </table>
</div>

</body>
</html>
