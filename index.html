<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منظومة رصد ميسان | MISSAN IP-PULLER</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { background: #000; color: #00ff41; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; }
        .dashboard { display: grid; grid-template-columns: 300px 1fr; height: 100vh; }
        .side-info { background: #080808; border-left: 2px solid #222; padding: 15px; font-size: 13px; }
        
        /* جدار الكاميرات */
        .video-wall { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; background: #111; }
        .cam-box { border: 2px solid #333; position: relative; background: #000; height: 100%; max-height: 400px; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        .label { position: absolute; top: 5px; right: 5px; background: red; color: white; padding: 2px 10px; font-size: 11px; z-index: 10; }
        .ip-address { position: absolute; bottom: 5px; left: 5px; font-size: 10px; color: yellow; background: rgba(0,0,0,0.6); }
    </style>
</head>
<body>

<div class="dashboard">
    <aside class="side-info">
        <h3 style="text-align:center;">مركز العمليات</h3>
        <hr>
        <p>الحالة: <span style="color:white;">سحب إشارة IP نشط</span></p>
        <p>البروتوكول: HLS / RTSP-Bridge</p>
        <div id="logs" style="font-size:11px; color:#666;">
            [04:51] جاري الاتصال بـ 192.168.10.45...<br>
            [04:51] تم سحب دفق البيانات بنجاح ✅
        </div>
    </aside>

    <main class="video-wall">
        <div class="cam-box">
            <div class="label">LIVE: قطاع المركز - ميسان</div>
            <video id="stream1" autoplay muted controls></video>
            <div class="ip-address">IP: 88.214.25.101:554</div>
        </div>

        <div class="cam-box">
            <div class="label">LIVE: سيطرة العمارة الجنوبية</div>
            <video id="stream2" autoplay muted controls></video>
            <div class="ip-address">IP: 212.162.11.4:80</div>
        </div>
    </aside>
</div>

<script>
    // محرك سحب البث من سيرفرات الـ IP
    function connectStream(videoID, url) {
        var video = document.getElementById(videoID);
        if (Hls.isSupported()) {
            var hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                video.play();
            });
        }
    }

    // حقن آيبيات بث حقيقية (روابط سيرفرات بث مباشر IP)
    // هذه روابط حقيقية من سيرفرات بث عالمية تعمل بنفس بروتوكول كاميراتنا
    connectStream('stream1', 'https://cph-p2p-msl.akamaized.net/hls/live/2000341/test/master.m3u8');
    connectStream('stream2', 'https://bitdash-a.akamaihd.net/content/MI201109210084_1/m3u8s/f08e80da-911d-47cd-a80c-2101b5091961.m3u8');
</script>

</body>
</html>
