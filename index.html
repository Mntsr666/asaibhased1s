<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منظومة رصد ميسان - البث العام</title>
    <style>
        body { background: #000; color: #00ff41; font-family: 'Courier New', monospace; margin: 0; }
        .header { background: #111; padding: 10px; border-bottom: 2px solid #00ff41; text-align: center; }
        
        .stream-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(45%, 1fr)); gap: 10px; padding: 10px; }
        .camera-box { border: 1px solid #333; position: relative; background: #050505; height: 400px; }
        .camera-box iframe { width: 100%; height: 100%; border: none; }
        
        .overlay-info { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.7); padding: 5px; font-size: 12px; z-index: 10; }
        .live-dot { height: 10px; width: 10px; background-color: red; border-radius: 50%; display: inline-block; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
        
        .control-bar { position: fixed; bottom: 0; width: 100%; background: #111; padding: 10px; border-top: 1px solid #333; font-size: 12px; }
    </style>
</head>
<body>

<div class="header">
    <h2>المنظومة المركزية | سحب بث ميسان المفتوح</h2>
</div>

<div class="stream-container">
    <div class="camera-box">
        <div class="overlay-info"><span class="live-dot"></span> مباشر: مركز مدينة العمارة - شارع دجلة</div>
        <iframe src="https://www.youtube.com/embed/S_vT_93I_2g?autoplay=1&mute=1&controls=0" allow="autoplay"></iframe>
    </div>

    <div class="camera-box">
        <div class="overlay-info"><span class="live-dot"></span> مباشر: مدخل محافظة ميسان</div>
        <iframe src="https://www.youtube.com/embed/lvpS_H_M5Gg?autoplay=1&mute=1&controls=0" allow="autoplay"></iframe>
    </div>
</div>

<div class="control-bar">
    [STATUS]: جاري سحب الإشارة من سيرفرات ميسان العامة... | إحداثيات الموقع: 31.8450° N, 47.1450° E | الدخول مصرح للعقيد منتظر حامد
</div>

</body>
</html>
