<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منظومة السيطرات المركزية - ميسان v29.0</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        :root { --gold: #d4af37; --bg: #050505; --panel: #111; --blue: #0088ff; --red: #ff3333; --green: #00ff9d; }
        body { background: var(--bg); color: #fff; font-family: 'Cairo', sans-serif; margin: 0; padding: 10px; }
        
        /* الهوية البصرية */
        header { border-bottom: 3px solid var(--gold); padding: 15px; display: flex; justify-content: space-between; background: var(--panel); border-radius: 10px; margin-bottom: 10px; }
        .layout { display: grid; grid-template-columns: 380px 1fr; gap: 15px; }
        
        /* الخارطة الواقعية */
        .map-container { background: #1a1a1a; height: 550px; border-radius: 15px; border: 2px solid #333; position: relative; overflow: hidden; background-image: radial-gradient(#222 1px, transparent 1px); background-size: 20px 20px; }
        .map-label { position: absolute; color: #444; font-weight: 900; pointer-events: none; text-transform: uppercase; }
        
        /* السيطرات والرموز */
        .pin { position: absolute; cursor: pointer; transform: translate(-50%, -100%); transition: 0.2s; z-index: 10; }
        .pin:hover { transform: translate(-50%, -100%) scale(1.2); }
        .pin-tag { font-size: 10px; background: rgba(0,0,0,0.8); padding: 2px 6px; border-radius: 4px; white-space: nowrap; position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%); border: 1px solid var(--gold); }

        /* الألوان حسب الصنف */
        .police-fed { color: var(--blue); } /* اتحادية */
        .police-njd { color: var(--green); } /* نجدة */
        .police-trf { color: var(--red); }   /* مرور */

        /* النماذج */
        .sidebar { background: var(--panel); padding: 20px; border-radius: 10px; border: 1px solid #333; }
        label { display: block; margin: 12px 0 5px; color: var(--gold); font-size: 13px; font-weight: bold; }
        select, input { width: 100%; background: #000; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 5px; font-family: 'Cairo'; margin-bottom: 10px; }
        .btn { background: var(--gold); color: #000; border: none; padding: 12px; border-radius: 5px; font-weight: 900; cursor: pointer; width: 100%; }
        
        /* الجدول */
        .table-wrap { margin-top: 15px; max-height: 250px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: #1a1a1a; color: var(--gold); padding: 10px; position: sticky; top: 0; }
        td { padding: 10px; text-align: center; border-bottom: 1px solid #222; }

        .legend { display: flex; justify-content: space-around; background: #000; padding: 10px; border-radius: 5px; margin-bottom: 10px; font-size: 12px; }
    </style>
</head>
<body>

<header>
    <div>
        <h2 style="margin:0;">منظومة السيطرات المركزية - محافظة ميسان</h2>
        <small style="color: var(--gold);">تحديث ميداني مباشر 2026</small>
    </div>
    <div id="clock" style="font-weight: 900; color: var(--green); font-size: 20px;"></div>
</header>

<div class="layout">
    <div class="sidebar">
        <h3 style="margin-top:0">توثيق بشري وميداني</h3>
        
        <label>اسم الشخص الحقيقي</label>
        <input type="text" id="pName" placeholder="الاسم الكامل">

        <label>نوع السيطرة / الموقع</label>
        <select id="pType">
            <option value="police-fed">سيطرة شرطة اتحادية</option>
            <option value="police-njd">سيطرة نجدة ميسان</option>
            <option value="police-trf">سيطرة مرور ميسان</option>
            <option value="h-office">موقع الهيئة / التبرع</option>
        </select>

        <label>الموقع الجغرافي (قواطع العمارة)</label>
        <select id="pLoc">
            <option value="15,45">مدخل العمارة (طريق بغداد)</option>
            <option value="45,15">سيطرة البتيرة (طريق الناصرية)</option>
            <option value="85,50">سيطرة العزير (طريق البصرة)</option>
            <option value="50,50">مركز المدينة (جسر الكرامة)</option>
            <option value="40,65">حي عواشة (مواكب التبرع)</option>
            <option value="60,45">الشبانة (مجمع الهيئة)</option>
        </select>

        <button class="btn" onclick="saveToMap()">حفظ وتثبيت في الحاسبة</button>

        <div class="table-wrap">
            <table id="logs">
                <thead>
                    <tr><th>الاسم</th><th>الجهة</th><th>الموقع</th></tr>
                </thead>
                <tbody id="tBody"></tbody>
            </table>
        </div>
        <button class="btn" style="background:#333; color:#fff; margin-top:10px;" onclick="clearData()">مسح السجلات</button>
    </div>

    <div class="main-map">
        <div class="legend">
            <span>🔵 شرطة اتحادية</span>
            <span>🟢 نجدة ميسان</span>
            <span>🔴 مرور</span>
            <span>🟡 هيئات / مواكب</span>
        </div>
        
        <div class="map-container" id="map">
            <div class="map-label" style="top:10%; left:40%">طريق بغداد - كميت</div>
            <div class="map-label" style="top:50%; left:5%; transform:rotate(-90deg)">طريق البتيرة</div>
            <div class="map-label" style="top:90%; left:45%">طريق البصرة - العزير</div>
            <div class="map-label" style="top:52%; left:48%; color:#333">نهر دجلة</div>

            <div class="pin police-fed" style="top:15%; left:45%">📍<div class="pin-tag">سيطرة الكرامة (اتحادية)</div></div>
            <div class="pin police-njd" style="top:50%; left:50%">📍<div class="pin-tag">جسر غزة (نجدة)</div></div>
        </div>
    </div>
</div>

<script>
    // نظام الحفظ الدائم سيدي
    let db = JSON.parse(localStorage.getItem('maysan_final_v29') || '[]');

    function saveToMap() {
        let name = document.getElementById('pName').value;
        let type = document.getElementById('pType').value;
        let coords = document.getElementById('pLoc').value;
        let locName = document.getElementById('pLoc').options[document.getElementById('pLoc').selectedIndex].text;
        let typeName = document.getElementById('pType').options[document.getElementById('pType').selectedIndex].text;

        if(!name) return alert("سيدي، يرجى إدخال اسم الشخص.");

        let entry = { name, type, coords, locName, typeName };
        db.push(entry);
        localStorage.setItem('maysan_final_v29', JSON.stringify(db));
        
        document.getElementById('pName').value = "";
        render();
    }

    function render() {
        let b = document.getElementById('tBody');
        let m = document.getElementById('map');
        b.innerHTML = "";
        
        // مسح النقاط القديمة سيدي لعدم التكرار
        document.querySelectorAll('.user-pin').forEach(p => p.remove());

        db.forEach(p => {
            // إضافة للجدول
            b.innerHTML += `<tr>
                <td><b>${p.name}</b></td>
                <td class="${p.type}">${p.typeName}</td>
                <td>${p.locName}</td>
            </tr>`;

            // إضافة للخارطة
            let c = p.coords.split(',');
            let pin = document.createElement('div');
            pin.className = `pin user-pin ${p.type}`;
            pin.style.top = c[0] + '%';
            pin.style.left = c[1] + '%';
            pin.innerHTML = `📍<div class="pin-tag">${p.name} (${p.typeName})</div>`;
            m.appendChild(pin);
        });
    }

    function clearData() {
        if(confirm("سيدي، هل أنت متأكد من مسح جميع السجلات الحقيقية من الحاسبة؟")) {
            localStorage.removeItem('maysan_final_v29');
            db = [];
            render();
        }
    }

    // تشغيل المنظومة سيدي
    setInterval(() => document.getElementById('clock').innerText = new Date().toLocaleTimeString('ar-EG'), 1000);
    render();
</script>
</body>
</html>
