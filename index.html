<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منظومة الأرشفة المركزية</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --accent: #238636; --text: #c9d1d9; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 15px; margin: 0; }
        .container { max-width: 800px; margin: auto; }
        .form-box { background: var(--card); padding: 20px; border-radius: 10px; border: 1px solid #30363d; margin-bottom: 20px; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; background: #0d1117; color: #fff; border: 1px solid #30363d; border-radius: 6px; box-sizing: border-box; }
        
        .upload-area { background: #0d1117; border: 2px dashed #58a6ff; padding: 20px; text-align: center; cursor: pointer; border-radius: 8px; margin: 10px 0; }
        .btn-save { width: 100%; background: var(--accent); color: white; padding: 15px; border: none; font-weight: bold; border-radius: 6px; cursor: pointer; font-size: 16px; }
        
        table { width: 100%; margin-top: 20px; border-collapse: collapse; background: var(--card); border-radius: 8px; overflow: hidden; }
        th, td { padding: 12px; text-align: right; border-bottom: 1px solid #30363d; }
        th { background: #21262d; }
        .download-btn { color: #58a6ff; text-decoration: none; font-weight: bold; border: 1px solid #58a6ff; padding: 4px 8px; border-radius: 4px; }
        .btn-del { background: #da3633; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center;">🏛️ منظومة أرشفة ميسان</h2>
    
    <div class="form-box">
        <input type="text" id="pName" placeholder="الاسم الكامل للشخص أو الملف">
        <select id="pType">
            <option value="قاعدة بيانات (Access)">قاعدة بيانات (Access)</option>
            <option value="ملف PDF">ملف PDF</option>
            <option value="ملف Excel">ملف Excel (XLSX)</option>
            <option value="معلومات مدنية">معلومات مدنية</option>
            <option value="معلومات عسكرية">معلومات عسكرية</option>
        </select>
        <textarea id="pNotes" placeholder="ملاحظات إضافية..."></textarea>
        
        <div class="upload-area" onclick="document.getElementById('pFile').click()">
            <span id="fileLabel">📁 انقر هنا لإرفاق الملف (Access, PDF, Excel)</span>
            <input type="file" id="pFile" style="display:none" onchange="updateLabel()">
        </div>
        
        <button class="btn-save" onclick="saveToSystem()">حفظ البيانات والمرفقات</button>
    </div>

    <input type="text" id="search" style="border-radius: 20px; padding: 15px;" placeholder="🔍 ابحث بالاسم أو النوع..." onkeyup="doSearch()">

    <table>
        <thead>
            <tr>
                <th>الاسم والمعلومات</th>
                <th>النوع</th>
                <th>المرفق</th>
                <th>إجراء</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
    let db;
    // فتح قاعدة البيانات
    const request = indexedDB.open("MaysanIntelArchive", 1);

    request.onupgradeneeded = (e) => {
        db = e.target.result;
        db.createObjectStore("archive", { keyPath: "id", autoIncrement: true });
    };

    request.onsuccess = (e) => {
        db = e.target.result;
        refreshTable(); // عرض البيانات فور فتح الصفحة
    };

    function updateLabel() {
        const file = document.getElementById('pFile').files[0];
        if (file) document.getElementById('fileStatus').innerText = "✅ تم اختيار: " + file.name;
        // تعديل بسيط للتسمية إذا لم يتغير المعرف
        document.getElementById('fileLabel').innerText = "✅ تم اختيار: " + file.name;
    }

    function saveToSystem() {
        const name = document.getElementById('pName').value;
        const fileInput = document.getElementById('pFile');
        const file = fileInput.files[0];

        if (!name) {
            alert("سيدي، يرجى إدخال الاسم أولاً.");
            return;
        }

        const reader = new FileReader();
        reader.onload = function(e) {
            const transaction = db.transaction(["archive"], "readwrite");
            const store = transaction.objectStore("archive");
            
            const entry = {
                name: name,
                type: document.getElementById('pType').value,
                notes: document.getElementById('pNotes').value,
                fileName: file ? file.name : null,
                fileData: file ? e.target.result : null
            };

            const addRequest = store.add(entry);
            
            addRequest.onsuccess = () => {
                alert("تم الحفظ بنجاح سيدي.");
                clearForm();
                refreshTable(); // هذه هي الخطوة التي كانت ناقصة (التحديث الفوري)
            };
        };

        if (file) {
            reader.readAsDataURL(file);
        } else {
            // حفظ البيانات حتى بدون ملف
            reader.onload({target: {result: null}});
        }
    }

    function refreshTable() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = ""; // مسح الجدول القديم

        const store = db.transaction("archive").objectStore("archive");
        store.openCursor().onsuccess = (e) => {
            const cursor = e.target.result;
            if (cursor) {
                const item = cursor.value;
                tbody.innerHTML += `
                    <tr>
                        <td><strong>${item.name}</strong><br><small style="color:#8b949e">${item.notes}</small></td>
                        <td>${item.type}</td>
                        <td>${item.fileData ? `<a href="${item.fileData}" download="${item.fileName}" class="download-btn">⬇️ تحميل</a>` : '-'}</td>
                        <td><button class="btn-del" onclick="deleteItem(${item.id})">حذف</button></td>
                    </tr>`;
                cursor.continue();
            }
        };
    }

    function doSearch() {
        const q = document.getElementById('search').value.toLowerCase();
        const rows = document.querySelectorAll("#tableBody tr");
        rows.forEach(r => r.style.display = r.innerText.toLowerCase().includes(q) ? "" : "none");
    }

    function deleteItem(id) {
        if (confirm("هل تريد الحذف سيدي؟")) {
            const tx = db.transaction("archive", "readwrite");
            tx.objectStore("archive").delete(id);
            tx.oncomplete = () => refreshTable();
        }
    }

    function clearForm() {
        document.getElementById('pName').value = "";
        document.getElementById('pNotes').value = "";
        document.getElementById('pFile').value = "";
        document.getElementById('fileLabel').innerText = "📁 انقر هنا لإرفاق الملف (Access, PDF, Excel)";
    }
</script>

</body>
</html>
