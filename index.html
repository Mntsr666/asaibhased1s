<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام الاستعلام الأمني المتطور - مديرية مرور ميسان</title>
    <style>
        :root { --main-color: #1a237e; --accent-color: #c62828; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #eef2f3; margin: 0; padding: 20px; }
        .dashboard { max-width: 1000px; margin: auto; background: white; border-top: 5px solid var(--main-color); border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); padding: 30px; }
        header { text-align: center; border-bottom: 2px solid #eee; margin-bottom: 25px; padding-bottom: 10px; }
        .grid-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .form-group { display: flex; flex-direction: column; }
        label { font-weight: bold; margin-bottom: 8px; color: #333; }
        select, input { padding: 12px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; }
        .full-width { grid-column: span 2; }
        .btn-search { background: var(--main-color); color: white; border: none; padding: 15px; border-radius: 5px; cursor: pointer; font-size: 18px; transition: 0.3s; margin-top: 20px; }
        .btn-search:hover { background: #0d1440; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .status-badge { display: inline-block; padding: 5px 10px; border-radius: 4px; font-size: 12px; background: #4caf50; color: white; margin-top: 10px; }
    </style>
</head>
<body>

<div class="dashboard">
    <header>
        <h2>نظام إدارة بيانات المركبات والاستعلام الاستخباراتي</h2>
        <p>محافظة ميسان - المكتب الأمني</p>
    </header>

    <div class="grid-container">
        <div class="form-group">
            <label>القاطع / المنطقة (العمارة)</label>
            <select id="region">
                <option>مركز المدينة</option>
                <option>قضاء المجر الكبير</option>
                <option>قضاء الميمونة</option>
                <option>قضاء قلعة صالح</option>
                <option>قضاء علي الغربي</option>
                <option>ناحية المشرح</option>
            </select>
        </div>

        <div class="form-group">
            <label>رقم اللوحة</label>
            <input type="text" placeholder="مثال: 123456">
        </div>

        <div class="form-group">
            <label>فصيلة الدم</label>
            <select>
                <option>A+</option>
                <option>A-</option>
                <option>B+</option>
                <option>B-</option>
                <option>O+</option>
                <option>O-</option>
                <option>AB+</option>
                <option>AB-</option>
            </select>
        </div>

        <div class="form-group">
            <label>المواليد</label>
            <input type="date">
        </div>

        <div class="form-group full-width">
            <label>رفع بيانات من ملف نصي (Bulk Import)</label>
            <input type="file" accept=".txt">
        </div>

        <button class="btn-search full-width">استعلام ذكي مدعوم بالذكاء الاصطناعي</button>
    </div>

    <div id="results" style="margin-top: 30px; display: none; border-top: 2px solid #eee; padding-top: 20px;">
        <h3>نتائج الاستعلام الأمني:</h3>
        <p><strong>حالة المركبة:</strong> <span class="status-badge">سليمة - لا يوجد حجز</span></p>
        <p><strong>القيود الجنائية:</strong> لا توجد ملاحظات استخباراتية حالياً.</p>
    </div>
</div>

<script>
    document.querySelector('.btn-search').addEventListener('click', function() {
        alert('جاري الاتصال بقاعدة بيانات المرور العامة... يرجى الانتظار');
        document.getElementById('results').style.display = 'block';
    });
</script>

</body>
</html>
