<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قاعدة البيانات المحمية</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #eef2f7; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 20px; }
        
        /* نظام القفل */
        #loginScreen { text-align: center; }
        #mainContent { display: none; }

        input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ddd; outline: none; transition: 0.3s; }
        input:focus { border-color: #3498db; box-shadow: 0 0 5px rgba(52,152,219,0.3); }
        
        .btn-main { background-color: #3498db; color: white; border: none; cursor: pointer; font-weight: bold; }
        .btn-main:hover { background-color: #2980b9; }
        
        .file-input-wrapper { background: #f9f9f9; padding: 10px; border: 2px dashed #bbb; border-radius: 8px; text-align: center; cursor: pointer; }
        
        .item { background: #fff; border-bottom: 1px solid #eee; padding: 15px; display: flex; flex-direction: column; gap: 5px; position: relative; }
        .item:last-child { border-bottom: none; }
        .delete-btn { width: auto; background: #e74c3c; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 11px; align-self: flex-end; }
        
        .file-link { color: #3498db; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div id="loginScreen">
        <h2>🔒 النظام محمي</h2>
        <input type="password" id="passInput" placeholder="أدخل كلمة المرور الخاصة بك...">
        <button class="btn-main" onclick="checkPassword()">دخول</button>
        <p id="errorMsg" style="color: red; display: none;">كلمة المرور غير صحيحة!</p>
    </div>

    <div id="mainContent">
        <h2>📂 إدارة البيانات والملفات</h2>
        <input type="text" id="entryTitle" placeholder="عنوان البيانات (مثلاً: ملف العمل)...">
        
        <div class="file-input-wrapper">
            <p>اضغط هنا لاختيار ملف (اختياري)</p>
            <input type="file" id="fileInput" style="display: block;">
        </div>

        <button class="btn-main" onclick="saveEntry()">حفظ في القاعدة</button>

        <div id="displayArea">
            </div>
        
        <button onclick="logout()" style="background: #95a5a6; color: white; border: none; margin-top: 20px; cursor: pointer;">تسجيل خروج</button>
    </div>
</div>

<script>
    const MY_PASSWORD = "123"; // *** سيدي غير كلمة المرور من هنا ***
    let db;

    // فتح قاعدة البيانات
    const request = indexedDB.open("SecureStorageDB", 1);
    request.onupgradeneeded = (e) => {
        db = e.target.result;
        db.createObjectStore("entries", { keyPath: "id", autoIncrement: true });
    };
    request.onsuccess = (e) => { db = e.target.result; };

    // التحقق من كلمة المرور
    function checkPassword() {
        const input = document.getElementById("passInput").value;
        if (input === MY_PASSWORD) {
            document.getElementById("loginScreen").display = "none";
            document.getElementById("loginScreen").style.display = "none";
            document.getElementById("mainContent").style.display = "block";
            loadData();
        } else {
            document.getElementById("errorMsg").style.display = "block";
        }
    }

    // حفظ البيانات مع الملف
    function saveEntry() {
        const title = document.getElementById("entryTitle").value;
        const fileElement = document.getElementById("fileInput");
        const file = fileElement.files[0];

        if (!title) return alert("يرجى إدخال العنوان");

        const reader = new FileReader();
        reader.onload = function(event) {
            const transaction = db.transaction(["entries"], "readwrite");
            const store = transaction.objectStore("entries");
            
            const entry = {
                title: title,
                fileName: file ? file.name : null,
                fileData: file ? event.target.result : null, // يتم حفظ الملف كنص مشفر Base64
                date: new Date().toLocaleString()
            };

            store.add(entry);
            transaction.oncomplete = () => {
                alert("تم الحفظ بنجاح سيدي");
                document.getElementById("entryTitle").value = "";
                fileElement.value = "";
                loadData();
            };
        };

        if (file) {
            reader.readAsDataURL(file); // قراءة الملف لتحويله لبيانات قابلة للتخزين
        } else {
            // إذا لم يوجد ملف، احفظ العنوان فقط
            reader.onload({target: {result: null}});
        }
    }

    // تحميل وعرض البيانات
    function loadData() {
        const displayArea = document.getElementById("displayArea");
        displayArea.innerHTML = "<h3 style='margin-top:20px;'>السجلات الحالية:</h3>";

        const store = db.transaction("entries").objectStore("entries");
        store.openCursor().onsuccess = (e) => {
            const cursor = e.target.result;
            if (cursor) {
                const item = cursor.value;
                let fileHTML = item.fileName ? `<a class="file-link" href="${item.fileData}" download="${item.fileName}">⬇️ تحميل: ${item.fileName}</a>` : "لا يوجد ملف مرفق";
                
                displayArea.innerHTML += `
                    <div class="item">
                        <strong>📌 ${item.title}</strong>
                        <small>التاريخ: ${item.date}</small>
                        ${fileHTML}
                        <button class="delete-btn" onclick="deleteEntry(${item.id})">حذف السجل</button>
                    </div>`;
                cursor.continue();
            }
        };
    }

    function deleteEntry(id) {
        if(confirm("هل أنت متأكد من الحذف سيدي؟")) {
            const transaction = db.transaction(["entries"], "readwrite");
            transaction.objectStore("entries").delete(id);
            transaction.oncomplete = () => loadData();
        }
    }

    function logout() {
        location.reload();
    }
</script>

</body>
</html>
