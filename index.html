<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منظومة آل حميد - الوصول المركز</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.6.2/sql-wasm.js"></script>
    <style>
        :root { --neon: #00ff41; --bg: #050505; --panel: #111; }
        body { background: var(--bg); color: #fff; font-family: 'Tahoma', sans-serif; margin: 0; overflow-x: hidden; }
        
        /* واجهة الدخول */
        #login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .login-box { border: 1px solid var(--neon); padding: 40px; text-align: center; box-shadow: 0 0 20px rgba(0,255,65,0.2); border-radius: 5px; }
        
        /* واجهة النظام */
        #main-system { display: none; padding: 20px; }
        .header { border-bottom: 2px solid var(--neon); padding-bottom: 10px; margin-bottom: 20px; text-shadow: 0 0 10px var(--neon); }
        
        input, button { background: #1a1a1a; border: 1px solid #333; color: white; padding: 12px; border-radius: 4px; outline: none; }
        input:focus { border-color: var(--neon); }
        button { background: var(--neon); color: black; font-weight: bold; cursor: pointer; border: none; }
        button:hover { background: #00cc33; }

        .search-area { background: var(--panel); padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #222; color: var(--neon); padding: 12px; text-align: right; border-bottom: 2px solid #333; }
        td { padding: 10px; border-bottom: 1px solid #222; font-size: 13px; }
        tr:hover { background: #1a1a1a; }
        
        .file-upload { margin-bottom: 15px; color: var(--neon); }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h1 style="color: var(--neon);">AL-HAMID INTELLIGENCE</h1>
        <p>نظام أرشفة البيانات الكبرى</p>
        <input type="password" id="pass-input" placeholder="أدخل كلمة السر">
        <br><br>
        <button onclick="checkPass()">دخول المنظومة</button>
    </div>
</div>

<div id="main-system">
    <div class="header">
        <h1>محرك البحث الاستخباري - 2026</h1>
    </div>

    <div class="search-area">
        <div class="file-upload">
            <label>1. ارفع ملف قاعدة البيانات (sqlite.): </label>
            <input type="file" id="dbfile">
        </div>
        <div id="search-controls" style="display:none;">
            <label>2. ابحث في البيانات: </label>
            <input type="text" id="search-input" placeholder="اكتب الاسم هنا..." style="width: 50%;">
            <button onclick="executeSearch()">استعلام فوراً</button>
        </div>
    </div>

    <div id="results-count"></div>
    <table id="results-table">
        <thead><tr id="table-header"></tr></thead>
        <tbody id="table-body"></tbody>
    </table>
</div>

<script>
    let db = null;

    // التحقق من كلمة السر
    function checkPass() {
        const pass = document.getElementById('pass-input').value;
        if (pass === "2026") {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-system').style.display = 'block';
        } else {
            alert("الشفرة خاطئة سيدي.");
        }
    }

    // محرك تحميل قاعدة البيانات
    const fileInput = document.getElementById('dbfile');
    fileInput.onchange = function() {
        const f = fileInput.files[0];
        const r = new FileReader();
        r.onload = function() {
            const Uint8array = new Uint8Array(r.result);
            initSqlJs({ locateFile: file => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.6.2/${file}` }).then(function(SQL){
                db = new SQL.Database(Uint8array);
                document.getElementById('search-controls').style.display = 'block';
                alert("تم تحميل الـ 45 مليون اسم بنجاح. جاهز للبحث.");
            });
        }
        r.readAsArrayBuffer(f);
    }

    // محرك البحث
    function executeSearch() {
        if (!db) return;
        const queryTerm = document.getElementById('search-input').value;
        
        // جلب اسم الجدول الأول تلقائياً
        const res = db.exec("SELECT name FROM sqlite_master WHERE type='table'");
        const tableName = res[0].values[0][0];

        // تنفيذ الاستعلام (البحث في أول عمود)
        const searchRes = db.exec(`SELECT * FROM ${tableName} LIMIT 500`); // هنا يمكنك إضافة WHERE للفلترة
        
        renderTable(searchRes[0]);
    }

    function renderTable(data) {
        const header = document.getElementById('table-header');
        const body = document.getElementById('table-body');
        header.innerHTML = "";
        body.innerHTML = "";

        // العناوين
        data.columns.forEach(col => {
            header.innerHTML += `<th>${col}</th>`;
        });

        // الصفوف
        data.values.forEach(row => {
            let tr = "<tr>";
            row.forEach(cell => { tr += `<td>${cell || ''}</td>`; });
            tr += "</tr>";
            body.innerHTML += tr;
        });
        
        document.getElementById('results-count').innerText = `تم عرض أول ${data.values.length} نتيجة من القاعدة.`;
    }
</script>
</body>
</html>
