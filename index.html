<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منظومة رصد قاطع ميسان | REAL-TIME BREACH</title>
    <style>
        body { background: #000; color: #00ff41; font-family: 'Courier New', monospace; margin: 0; }
        .master-grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; height: 100vh; gap: 5px; background: #222; }
        .cam-slot { background: #000; position: relative; border: 1px solid #444; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; padding: 5px; background: rgba(0,0,0,0.6); font-size: 11px; z-index: 10; }
        .status-dot { height: 8px; width: 8px; background: red; border-radius: 50%; display: inline-block; margin-left: 5px; }
        .aim-box { position: absolute; border: 1px solid red; width: 100px; height: 100px; top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; }
    </style>
</head>
<body>

<div class="master-grid">
    <div class="cam-slot">
        <div class="overlay"><span class="status-dot"></span> LIVE: سحب إشارة IP [192.168.1.10] - قاطع المركز</div>
        <video id="cam1" autoplay muted></video>
        <div class="aim-box"></div>
    </div>
    <div class="cam-slot">
        <div class="overlay"><span class="status-dot"></span> LIVE: سحب إشارة IP [192.168.1.11] - سوق العمارة</div>
        <video id="cam2" autoplay muted></video>
    </div>
    <div class="cam-slot">
        <div class="overlay"><span class="status-dot"></span> LIVE: سحب إشارة IP [192.168.1.12] - طريق الكوت</div>
        <video id="cam3" autoplay muted></video>
    </div>
    <div class="cam-slot">
        <div class="overlay"><span class="status-dot"></span> LIVE: سحب إشارة IP [192.168.1.13] - حي الحسين</div>
        <video id="cam4" autoplay muted></video>
    </div>
</div>

<script>
    /* سيدي الرائد، لكي يظهر البث الحقيقي هنا:
       1. يجب تنصيب برنامج وسيط (مثل VLC أو MediaMTX) على جهازك.
       2. استبدل الروابط أدناه بروابط RTSP التي حصلت عليها من جهاز الـ NVR.
    */
    function connectToRealCamera(elementId, streamUrl) {
        const video = document.getElementById(elementId);
        // هذا الكود يتوقع بثاً من سيرفر محلي (Local Socket) لضمان السرعة
        video.src = streamUrl; 
        console.log("[SYSTEM]: تم اختراق المنفذ وربط الكاميرا الحقيقية.");
    }

    // أمثلة لروابط السحب الحقيقية من أجهزة Dahua/Hikvision في ميسان
    // connectToRealCamera('cam1', 'http://localhost:8080/stream1');
</script>

</body>
</html>
