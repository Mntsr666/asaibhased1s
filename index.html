<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام الأرشفة والاستيراد الجماعي المركزي</title>
    <style>
        :root { --gold: #d4af37; --bg: #050505; --green: #00ff41; }
        body { background: var(--bg); color: var(--gold); font-family: 'Arial', sans-serif; margin: 0; padding: 10px; }
        
        #lock-screen { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .lock-box { border: 2px solid var(--gold); padding: 35px; border-radius: 15px; text-align: center; background: #111; }
        
        .main-container { max-width: 1200px; margin: auto; border: 2px solid var(--gold); background: #111; border-radius: 10px; display: none; overflow: hidden; }
        
        header { background: #000; padding: 15px; border-bottom: 2px solid var(--gold); display: flex; justify-content: space-between; align-items: center; }
        .logo img { width: 80px; filter: drop-shadow(0 0 5px var(--gold)); }

        .action-bar { padding: 15px; background: #1a1a1a; display: flex; gap: 10px; border-bottom: 1px solid #333; flex-wrap: wrap; }
        input[type="text"] { background: #000; border: 1px solid var(--gold); color: #fff; padding: 10px; border-radius: 5px; flex: 1; min-width: 200px; }
        .btn { background: var(--gold); color: #000; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; border-radius: 5px; }

        table { width: 100%; border-collapse: collapse; background: #000; }
        th { background: var(--gold); color: #000; padding: 12px; font-size: 14px; }
        td { border-bottom: 1px solid #222; padding: 10px; text-align: center; color: #ddd; }
        tr:hover { background: #151515; cursor: pointer; }

        /* الأضبارة */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.97); z-index: 1000; overflow-y: auto; }
        .modal-box { background: #111; width: 95%; max-width: 900px; margin: 20px auto; border: 2px solid var(--gold); border-radius: 8px; position: relative; }
        
        .tabs { display: flex; background: #000; border-bottom: 1px solid var(--gold); }
        .tab { padding: 12px; color: var(--gold); cursor: pointer; flex: 1; text-align: center; font-size: 12px; }
        .tab.active { background: var(--gold); color: #000; font-weight: bold; }
        .pane { display: none; padding: 20px; }
        .pane.active { display: block; }

        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .item { border-bottom: 1px solid #222; padding: 8px; display: flex; justify-content: space-between; }
        .money { color: var(--green); font-weight: bold; }

        @media print { .no-print { display: none; } .modal { position: static; display: block; } .tab, .tabs { display: none; } .pane { display: block !important; } }
    </style>
</head>
<body>

<div id="lock-screen">
    <div class="lock-box">
        <img src="367.gif" width="100">
        <h2 style="color: var(--gold);">نظام الاستعلام والاستيراد الجماعي</h2>
        <input type="password" id="passInput" placeholder="أدخل شفرة الوصول" style="text-align:center; padding:10px; margin-bottom:15px; background:#000; border:1px solid var(--gold); color:#fff;">
        <br>
        <button class="btn" onclick="checkPass()">دخول سيدي</button>
    </div>
</div>

<div class="main-container no-print" id="mainUI">
    <header>
        <div class="logo"><img src="367.gif"></div>
        <div style="text-align:center">
            <h1 style="margin:0; font-size: 18px;">قاعدة البيانات المركزية - مكتب ميسان</h1>
            <p style="margin:0; font-size: 11px;">الاستخبارات | المالية | الذمم</p>
        </div>
        <div style="font-size: 10px; color: var(--green);">MODE: BULK IMPORT</div>
    </header>

    <div class="action-bar">
        <input type="text" id="search" onkeyup="filter()" placeholder="🔍 ابحث عن أي معلومة...">
        
        <button class="btn" onclick="document.getElementById('importTxt').click()">📁 استيراد ملف جماعي (TXT)</button>
        <input type="file" id="importTxt" hidden accept=".txt" onchange="handleBulkImport(event)">
        
        <button class="btn" style="background:#444; color:#fff;" onclick="addNewManual()">+ إضافة يدوي</button>
        <button class="btn" style="background:#ff3333; color:#fff;" onclick="clearAll()">تصفير</button>
    </div>

    <table id="table">
        <thead>
            <tr><th>المعرف</th><th>الاسم الكامل</th><th>الصنف</th><th>الراتب</th><th>الحالة</th></tr>
        </thead>
        <tbody id="body"></tbody>
    </table>
</div>

<div id="modal" class="modal">
    <div class="modal-box">
        <div class="no-print" style="background:var(--gold); padding:10px; color:#000; display:flex; justify-content:space-between; font-weight:bold;">
            <span>الملف الإلكتروني للمنتسب</span>
            <span style="cursor:pointer;" onclick="closeM()">[ إغلاق ]</span>
        </div>
        <div class="tabs no-print">
            <div class="tab active" onclick="showT(event, 't1')">البيانات الإدارية</div>
            <div class="tab" onclick="showT(event, 't2')">الذمة والعتاد</div>
            <div class="tab" onclick="showT(event, 't3')">السجل المالي</div>
        </div>
        <div id="t1" class="pane active"><div class="data-grid" id="d1"></div></div>
        <div id="t2" class="pane"><div class="data-grid" id="d2"></div></div>
        <div id="t3" class="pane"><div class="data-grid" id="d3"></div></div>
        <div style="padding:20px;" class="no-print"><button class="btn" onclick="window.print()">طباعة الملف</button></div>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem("bulk_maysan_db") || "[]");

    function checkPass() {
        if(document.getElementById("passInput").value === "2026") {
            document.getElementById("lock-screen").style.display = "none";
            document.getElementById("mainUI").style.display = "block";
            render();
        } else { alert("الشفرة خاطئة سيدي!"); }
    }

    function render() {
        let h = "";
        db.forEach((p, i) => {
            h += `<tr onclick="openM(${i})">
                <td>${p.id}</td>
                <td style="color:#fff; font-weight:bold;">${p.name}</td>
                <td>${p.branch}</td>
                <td class="money">${p.salary} د.ع</td>
                <td style="color:var(--green)">سليم</td>
            </tr>`;
        });
        document.getElementById("body").innerHTML = h;
    }

    // محرك الاستيراد الجماعي سيدي
    function handleBulkImport(event) {
        let file = event.target.files[0];
        if (!file) return;

        let reader = new FileReader();
        reader.onload = function(e) {
            let lines = e.target.result.split('\n');
            let count = 0;
            lines.forEach(line => {
                if(line.trim() !== "") {
                    let parts = line.split(','); // التنسيق: الاسم, الصنف, الراتب
                    let p = {
                        id: "M-" + Math.floor(10000 + Math.random() * 90000),
                        name: parts[0] ? parts[0].trim() : "غير معرف",
                        branch: parts[1] ? parts[1].trim() : "مشاة",
                        salary: parts[2] ? parts[2].trim() : "1,100,000",
                        addr: "ميسان", brig: "لواء 1", rank: "مقاتل", weap: "AK-47",
                        weap_sn: "SN-" + Math.floor(Math.random()*999), gear: "كاملة",
                        bank: "الرافدين", master: "6020 XXXX", allow: "خطورة", stat: "سليم"
                    };
                    db.push(p);
                    count++;
                }
            });
            localStorage.setItem("bulk_maysan_db", JSON.stringify(db));
            alert("سيدي، تم استيراد " + count + " منتسب بنجاح.");
            render();
        };
        reader.readAsText(file);
    }

    function openM(i) {
        let p = db[i];
        fill("d1", {"الاسم":p.name, "المعرف":p.id, "الصنف":p.branch, "الرتبة":p.rank, "السكن":p.addr, "الموقف":p.stat});
        fill("d2", {"نوع السلاح":p.weap, "رقم السلاح":p.weap_sn, "التجهيزات":p.gear, "اللواء":p.brig});
        fill("d3", {"الراتب المستلم":p.salary + " د.ع", "المصرف":p.bank, "الماستر كارد":p.master, "المخصصات":p.allow});
        document.getElementById("modal").style.display = "block";
    }

    function fill(id, data) {
        let h = "";
        for (let k in data) h += `<div class="item"><span style="color:var(--gold)">${k}:</span><span class="${k.includes('الراتب')?'money':''}">${data[k]}</span></div>`;
        document.getElementById(id).innerHTML = h;
    }

    function showT(e, id) {
        let ps = document.getElementsByClassName("pane"), ts = document.getElementsByClassName("tab");
        for(let x of ps) x.classList.remove("active");
        for(let x of ts) x.classList.remove("active");
        document.getElementById(id).classList.add("active");
        e.currentTarget.classList.add("active");
    }

    function closeM() { document.getElementById("modal").style.display = "none"; }
    function filter() {
        let v = document.getElementById("search").value.toUpperCase();
        let tr = document.getElementById("table").getElementsByTagName("tr");
        for(let i=1; i<tr.length; i++) tr[i].style.display = tr[i].innerText.toUpperCase().includes(v) ? "" : "none";
    }
    function clearAll() { if(confirm("تصفير كافة السجلات سيدي؟")) { localStorage.removeItem("bulk_maysan_db"); location.reload(); } }
</script>
</body>
</html>
