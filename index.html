<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منظومة السيادة v70.0 | غرفة العمليات</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        :root { --neon: #00f2ff; --gold: #c5a059; --bg: #020202; --card: #0a0a0a; }
        
        body { 
            background: var(--bg); color: #fff; font-family: 'Cairo', sans-serif; 
            margin: 0; overflow: hidden; height: 100vh;
            border: 2px solid var(--gold); box-sizing: border-box;
        }

        /* دخول السيادة */
        #gate { position: fixed; inset: 0; z-index: 10000; background: #000; display: flex; align-items: center; justify-content: center; }
        .gate-ui { text-align: center; border: 1px solid var(--gold); padding: 50px; background: radial-gradient(#111, #000); box-shadow: 0 0 50px rgba(197, 160, 89, 0.2); }

        /* الشاشة الرئيسية */
        .dashboard { display: grid; grid-template-columns: 350px 1fr 350px; height: 100vh; gap: 10px; padding: 10px; }

        /* الأجنحة */
        .panel { background: var(--card); border: 1px solid #1a1a1a; display: flex; flex-direction: column; padding: 15px; position: relative; }
        .panel-header { color: var(--gold); border-bottom: 2px solid var(--gold); padding-bottom: 8px; margin-bottom: 15px; font-weight: 900; font-size: 14px; display: flex; justify-content: space-between; }

        /* الخريطة التكتيكية */
        .map-box { background: #000; border: 1px solid #222; position: relative; overflow: hidden; }
        #live-map { width: 100%; height: 100%; border: none; filter: brightness(0.7) contrast(1.2) hue-rotate(180deg); }

        /* المدخلات السينمائية */
        .input-box { background: #000; border: 1px solid #333; color: var(--neon); padding: 12px; width: 100%; margin-bottom: 8px; font-family: 'Cairo'; font-size: 13px; outline: none; }
        .input-box:focus { border-color: var(--gold); }
        .btn-main { background: var(--gold); color: #000; border: none; padding: 12px; font-weight: 900; cursor: pointer; width: 100%; transition: 0.3s; }
        .btn-main:hover { background: #fff; box-shadow: 0 0 20px var(--gold); }

        /* الداتابيس الفعلي (سجلات ميسان) */
        .db-scroll { flex: 1; overflow-y: auto; padding-right: 5px; }
        .db-entry { background: #050505; border-right: 3px solid var(--gold); padding: 10px; margin-bottom: 8px; font-size: 12px; position: relative; }
        .db-entry:hover { background: #0f0f0f; }
        .db-badge { background: var(--gold); color: #000; padding: 2px 5px; font-size: 9px; font-weight: bold; position: absolute; left: 5px; top: 5px; }

        /* الهوية سيدي */
        @media print { .dashboard, #gate { display: none; } #id-card { display: block !important; } }
        #id-card { display: none; width: 350px; background: #fff; color: #000; padding: 20px; border: 5px double #000; margin: auto; text-align: center; }
    </style>
</head>
<body>

<div id="gate">
    <div class="gate-ui">
        <h1 style="color:var(--gold); margin:0;">نظام القبضة السيادية v70.0</h1>
        <p style="color:#555; font-size:12px;">قاطع ميسان | مديرية الاستخبارات</p>
        <input type="password" id="gate-pass" class="input-box" placeholder="شفرة العبور" style="text-align: center; margin-top: 20px;">
        <button class="btn-main" onclick="openSystem()">نعم سيدي</button>
    </div>
</div>

<div class="dashboard" id="ui" style="display: none;">
    <div class="panel">
        <div class="panel-header"><span>👥 داتابيس النخبة</span> <span id="count-p">0</span></div>
        <input type="text" id="p-name" class="input-box" placeholder="الاسم الرباعي">
        <select id="p-group" class="input-box">
            <option>عصائب أهل الحق</option>
            <option>الحشد الشعبي (المقر)</option>
        </select>
        <input type="text" id="p-weapon" class="input-box" placeholder="رقم السلاح (الذمة)">
        <input type="text" id="p-blood" class="input-box" placeholder="فصيلة الدم">
        <button class="btn-main" onclick="saveToDB()">أرشفة البيانات سيدي</button>
        
        <div class="db-scroll" id="p-list" style="margin-top: 15px;"></div>
    </div>

    <div class="map-box">
        <div style="position:absolute; top:20px; left:20px; z-index:100; background:rgba(0,0,0,0.8); padding:15px; border:1px solid var(--gold); pointer-events:none;">
            <div id="clock" style="color:var(--gold); font-size:18px; font-weight:900;"></div>
            <div style="font-size:10px; letter-spacing:2px;">LOCATION: AMA-MSN-IRQ</div>
        </div>
        <iframe id="live-map" src="http://googleusercontent.com/maps.google.com/satellite"></iframe>
    </div>

    <div class="panel">
        <div class="panel-header"><span>🚔 موقف السيطرات</span> <span id="count-c">0</span></div>
        <input type="text" id="c-name" class="input-box" placeholder="اسم السيطرة">
        <select id="c-force" class="input-box">
            <option>شرطة اتحادية</option><option>نجدة</option><option>رد سريع</option>
        </select>
        <button class="btn-main" onclick="saveCP()">تثبيت الميدان</button>
        
        <div id="c-list" style="height:150px; overflow-y:auto; margin:10px 0;"></div>

        <div class="panel-header" style="margin-top:10px;"><span>🤖 تحليل AI العميق</span></div>
        <input type="text" id="ai-scan" class="input-box" placeholder="بحث شامل (اسم/سلاح)...">
        <button class="btn-main" style="background:#800; color:#fff;" onclick="aiSearch()">بدء الفحص الجنائي</button>
        <div id="ai-output" style="margin-top:10px; font-size:11px; color:var(--neon); background:#050505; padding:10px; border-right:2px solid var(--neon); display:none;"></div>
        
        <button class="btn-main" style="margin-top: auto; background:#111; color:var(--gold); border:1px solid var(--gold);" onclick="exportBackup()">تصدير الداتابيس (Backup)</button>
    </div>
</div>

<div id="id-card">
    <h3>هيئة الحشد الشعبي</h3>
    <p>أمن ميسان</p>
    <hr>
    <h2 id="out-name">الاسم</h2>
    <p id="out-code">CODE</p>
    <div style="margin-top:30px;"><b>الشيخ عدنان الغنامي</b><br>مدير أمن ميسان</div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('SOVEREIGN_DB_70') || '{"p":[], "c":[]}');

    function openSystem() {
        if(document.getElementById('gate-pass').value === "2026") {
            document.getElementById('gate').style.display = 'none';
            document.getElementById('ui').style.display = 'grid';
            render();
        } else { alert("سيدي، الشفرة خاطئة!"); }
    }

    function saveToDB() {
        let p = {
            id: "M-" + Math.floor(1000 + Math.random()*9000),
            name: document.getElementById('p-name').value,
            group: document.getElementById('p-group').value,
            weapon: document.getElementById('p-weapon').value,
            blood: document.getElementById('p-blood').value
        };
        if(p.name) { db.p.push(p); sync(); }
    }

    function saveCP() {
        let c = { name: document.getElementById('c-name').value, force: document.getElementById('c-force').value };
        if(c.name) { db.c.push(c); sync(); }
    }

    function aiSearch() {
        let q = document.getElementById('ai-scan').value;
        let out = document.getElementById('ai-output');
        out.style.display = 'block';
        out.innerHTML = "جاري تفتيش السجلات الرقمية...<br>تحليل الارتباطات الأمنية...";
        setTimeout(() => {
            let res = db.p.find(x => x.name.includes(q) || x.weapon.includes(q));
            if(res) {
                out.innerHTML = `[إيجابي سيدي]<br>الاسم: ${res.name}<br>الرمز: ${res.id}<br>الذمة: ${res.weapon}<br>الحالة: مخول ونشط.`;
            } else { out.innerHTML = "⚠️ لا توجد بيانات. الشخص غير مخول في قاطع ميسان."; }
        }, 1000);
    }

    function exportBackup() {
        let blob = new Blob([JSON.stringify(db)], {type: "application/json"});
        let url = URL.createObjectURL(blob);
        let a = document.createElement('a');
        a.href = url; a.download = "maysan_security_db.json"; a.click();
    }

    function printID(name, id) {
        document.getElementById('out-name').innerText = name;
        document.getElementById('out-code').innerText = id;
        window.print();
    }

    function sync() { localStorage.setItem('SOVEREIGN_DB_70', JSON.stringify(db)); render(); }
    
    function render() {
        document.getElementById('count-p').innerText = db.p.length;
        document.getElementById('count-c').innerText = db.c.length;
        
        document.getElementById('p-list').innerHTML = db.p.map(x => `
            <div class="db-entry">
                <span class="db-badge">${x.id}</span>
                <b>${x.name}</b><br><small>${x.group} | ذمة: ${x.weapon}</small>
                <button onclick="printID('${x.name}','${x.id}')" style="display:block; width:100%; margin-top:5px; font-size:10px; cursor:pointer;">طبع هوية</button>
            </div>
        `).reverse().join('');

        document.getElementById('c-list').innerHTML = db.c.map(x => `
            <div class="db-entry" style="border-color:var(--neon)">
                <b>${x.name}</b><br><small>القوة: ${x.force}</small>
            </div>
        `).reverse().join('');
    }

    setInterval(() => document.getElementById('clock').innerText = new Date().toLocaleTimeString('ar-EG'), 1000);
</script>
</body>
</html>
