<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منظومة استخبارات قاطع ميسان - الإصدار المتكامل</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        :root { --gold: #c5a059; --bg: #0a0a0a; --panel: #181818; --green: #00ff9d; --red: #ff4d4d; }
        body { background: var(--bg); color: #fff; font-family: 'Cairo', sans-serif; margin: 0; padding: 10px; }
        
        #lock-screen { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .lock-panel { border: 2px solid var(--gold); padding: 40px; border-radius: 15px; text-align: center; background: #050505; box-shadow: 0 0 30px var(--gold); }
        
        .container { max-width: 1400px; margin: auto; display: none; }
        header { border-bottom: 3px solid var(--gold); padding: 20px; display: flex; justify-content: space-between; background: var(--panel); border-radius: 10px; }

        .dashboard { display: grid; grid-template-columns: 1fr 3fr; gap: 20px; margin-top: 20px; }
        .side-panel { background: var(--panel); padding: 20px; border-radius: 10px; border: 1px solid #333; }
        .main-content { background: var(--panel); padding: 20px; border-radius: 10px; border: 1px solid #333; }

        label { display: block; margin: 10px 0 5px; color: var(--gold); font-size: 13px; }
        select, input, textarea { width: 100%; background: #000; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 5px; box-sizing: border-box; font-family: 'Cairo'; }
        
        .btn { background: var(--gold); color: #000; border: none; padding: 12px; border-radius: 5px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 15px; }
        .btn:hover { background: #fff; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: var(--gold); color: #000; padding: 12px; font-size: 13px; }
        td { padding: 10px; text-align: center; border-bottom: 1px solid #222; font-size: 13px; }
        tr:hover { background: #222; cursor: pointer; }

        .ai-badge { background: #1a1a1a; border: 1px solid var(--green); color: var(--green); padding: 5px 10px; border-radius: 20px; font-size: 10px; }
        
        @media print { .no-print { display: none; } .print-area { display: block !important; padding: 50px; background: #fff; color: #000; border: 10px double #000; text-align: center; } }
        .print-area { display: none; }
    </style>
</head>
<body>

<div id="lock-screen">
    <div class="lock-panel">
        <h2 style="color: var(--gold);">نظام إدارة قاطع ميسان</h2>
        <input type="password" id="pInp" placeholder="شفرة الدخول">
        <button class="btn" onclick="login()">نعم سيدي</button>
    </div>
</div>

<div class="container" id="mainUI">
    <header>
        <div>
            <h1 style="margin:0; font-size: 20px;">القيادة المركزية - ميسان</h1>
            <small style="color: var(--gold);">نظام الاستعلام الاستخباراتي والأرشفة الميدانية</small>
        </div>
        <div id="clock" style="color: var(--green); font-weight: bold;"></div>
    </header>

    <div class="dashboard">
        <div class="side-panel">
            <h3 style="margin-top:0">توثيق جديد</h3>
            
            <label>الاسم الكامل</label>
            <input type="text" id="name" placeholder="الاسم الرباعي واللقب">

            <label>القاطع</label>
            <select id="sector">
                <option>القاطع الشمالي</option>
                <option>القاطع الجنوبي</option>
                <option>قاطع المركز</option>
                <option>قاطع الكحلاء</option>
                <option>قاطع المجر</option>
            </select>

            <label>القضاء / الناحية</label>
            <select id="area">
                <option>العمارة - المركز</option>
                <option>المجر الكبير</option>
                <option>قلعة صالح</option>
                <option>المشرح</option>
                <option>الكحلاء</option>
                <option>علي الغربي</option>
                <option>ميمونة</option>
                <option>كميت</option>
                <option>ناحية بني هاشم</option>
            </select>

            <label>الصنف العسكري</label>
            <select id="branch">
                <option>استخبارات</option>
                <option>أمن وطني</option>
                <option>مكافحة إرهاب</option>
                <option>دروع</option>
                <option>مشاة</option>
                <option>اتصالات</option>
            </select>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div>
                    <label>المواليد</label>
                    <select id="dob"></select>
                </div>
                <div>
                    <label>فصيلة الدم</label>
                    <select id="blood">
                        <option>O+</option><option>O-</option><option>A+</option><option>A-</option>
                        <option>B+</option><option>B-</option><option>AB+</option><option>AB-</option>
                    </select>
                </div>
            </div>

            <button class="btn" onclick="savePerson()">حفظ في القاعدة</button>
            <hr style="border: 0; border-top: 1px solid #333; margin: 20px 0;">
            <label>استيراد من ملف (Text)</label>
            <input type="file" id="fileInput" accept=".txt">
        </div>

        <div class="main-content">
            <div style="display: flex; gap: 10px;">
                <input type="text" id="search" onkeyup="filter()" placeholder="🔍 استعلام فوري عن اسم، منطقة، أو فصيلة دم..." style="flex: 2;">
                <button class="btn" style="margin:0; width: auto;" onclick="aiAnalyze()">استعلام ذكي AI</button>
            </div>

            <div id="aiResult" style="margin-top: 15px; display: none; background: #002200; padding: 15px; border: 1px solid var(--green); border-radius: 5px;">
                <span class="ai-badge">AI INTELLIGENCE</span>
                <p id="aiText" style="font-size: 14px; margin: 10px 0 0;"></p>
            </div>

            <table id="pTable">
                <thead>
                    <tr>
                        <th>الاسم</th>
                        <th>القاطع</th>
                        <th>المنطقة</th>
                        <th>المواليد</th>
                        <th>الدم</th>
                        <th>الصنف</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // تهيئة قائمة المواليد سيدي
    const dobSelect = document.getElementById('dob');
    for(let y=2010; y>=1980; y--) {
        let opt = document.createElement('option');
        opt.value = y; opt.innerText = y;
        dobSelect.appendChild(opt);
    }

    let db = JSON.parse(localStorage.getItem('maysan_pro_db') || '[]');

    function login() {
        if(document.getElementById('pInp').value === '2026') {
            document.getElementById('lock-screen').style.display = 'none';
            document.getElementById('mainUI').style.display = 'block';
            render();
        } else { alert("الشفرة خاطئة سيدي!"); }
    }

    function savePerson() {
        let p = {
            name: document.getElementById('name').value,
            sector: document.getElementById('sector').value,
            area: document.getElementById('area').value,
            branch: document.getElementById('branch').value,
            dob: document.getElementById('dob').value,
            blood: document.getElementById('blood').value
        };
        if(!p.name) return alert("سيدي، يرجى كتابة الاسم.");
        db.push(p);
        localStorage.setItem('maysan_pro_db', JSON.stringify(db));
        render();
        alert("تم الحفظ سيدي.");
    }

    function render() {
        let b = document.getElementById('tableBody');
        b.innerHTML = "";
        db.forEach((p, i) => {
            b.innerHTML += `<tr onclick="openProfile(${i})">
                <td style="font-weight:bold">${p.name}</td><td>${p.sector}</td><td>${p.area}</td><td>${p.dob}</td><td>${p.blood}</td><td>${p.branch}</td>
            </tr>`;
        });
    }

    function filter() {
        let v = document.getElementById('search').value.toLowerCase();
        let rows = document.querySelectorAll('#tableBody tr');
        rows.forEach(r => r.style.display = r.innerText.toLowerCase().includes(v) ? '' : 'none');
    }

    // ميزة استيراد الملف سيدي
    document.getElementById('fileInput').addEventListener('change', function(e) {
        let file = e.target.files[0];
        let reader = new FileReader();
        reader.onload = function(progressEvent) {
            let lines = this.result.split('\n');
            lines.forEach(line => {
                if(line.trim() !== "") {
                    db.push({ name: line.trim(), sector: "غير محدد", area: "ميسان", branch: "عام", dob: "1990", blood: "O+" });
                }
            });
            localStorage.setItem('maysan_pro_db', JSON.stringify(db));
            render();
            alert("سيدي، تم استيراد " + lines.length + " اسم من الملف.");
        };
        reader.readAsText(file);
    });

    // محاكاة الذكاء الاصطناعي للاستعلام سيدي
    function aiAnalyze() {
        let q = document.getElementById('search').value;
        if(!q) return alert("سيدي، يرجى كتابة اسم للاستعلام عنه بالذكاء الاصطناعي.");
        
        document.getElementById('aiResult').style.display = 'block';
        document.getElementById('aiText').innerText = "جاري تحليل البيانات الاستخبارية لـ (" + q + ")...";
        
        setTimeout(() => {
            document.getElementById('aiText').innerText = "تقرير الاستعلام: الشخص المذكور (" + q + ") مبرمج ضمن قاعدة بيانات قاطع ميسان. الموقف الأمني: سليم. السكن المرصود: محافظة ميسان. لا توجد ملاحظات استخبارية سلبية حالياً.";
        }, 1500);
    }

    setInterval(() => document.getElementById('clock').innerText = new Date().toLocaleTimeString('ar-EG'), 1000);
</script>
</body>
</html>
